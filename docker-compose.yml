services:
  app:
    build: .
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      DATABASE_URL: postgres://postgres:postgres@db:5432/homelab_feed
      HOMELAB_FEED_SOURCES: "@/app/config/sources.json"
    ports:
      - "3000:3000"
    volumes:
      - ./config:/app/config:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: homelab_feed
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - homelab-feed-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d homelab_feed"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  homelab-feed-postgres:
